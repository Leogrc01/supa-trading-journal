<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px">
        <div><div class="form-label" style="margin-bottom:8px">HTF – Biais</div>
          <div class="upload-zone" id="uz-htf" onclick="document.getElementById('fi-htf').click()">
            <input type="file" id="fi-htf" accept="image/*" onchange="handleImg(event,'uz-htf','pi-htf')">
            <img id="pi-htf" src="" style="display:none"><div class="overlay"><span style="color:#fff;font-size:12px">Changer</span></div>
            <div class="upload-icon">⬞</div><div class="upload-label-text">HTF</div><div class="upload-sublabel">D1 · H4 · H1</div>
          </div>
        </div>
        <div><div class="form-label" style="margin-bottom:8px">MTF – Confirmation</div>
          <div class="upload-zone" id="uz-mtf" onclick="document.getElementById('fi-mtf').click()">
            <input type="file" id="fi-mtf" accept="image/*" onchange="handleImg(event,'uz-mtf','pi-mtf')">
            <img id="pi-mtf" src="" style="display:none"><div class="overlay"><span style="color:#fff;font-size:12px">Changer</span></div>
            <div class="upload-icon">⬞</div><div class="upload-label-text">MTF</div><div class="upload-sublabel">M30 · M15 · M10</div>
          </div>
        </div>
        <div><div class="form-label" style="margin-bottom:8px">LTF – Entrée</div>
          <div class="upload-zone" id="uz-ltf" onclick="document.getElementById('fi-ltf').click()">
            <input type="file" id="fi-ltf" accept="image/*" onchange="handleImg(event,'uz-ltf','pi-ltf')">
            <img id="pi-ltf" src="" style="display:none"><div class="overlay"><span style="color:#fff;font-size:12px">Changer</span></div>
            <div class="upload-icon">⬞</div><div class="upload-label-text">LTF</div><div class="upload-sublabel">M5 · M1</div>
          </div>
        </div>
        <div>
          <div class="form-label" style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
            Résultat – Clôture
            <span style="font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(255,170,0,0.12);color:var(--orange);font-weight:600;letter-spacing:0.5px">APRÈS</span>
          </div>
          <div class="upload-zone" id="uz-result" onclick="document.getElementById('fi-result-img').click()" style="border-color:rgba(255,170,0,0.3)">
            <input type="file" id="fi-result-img" accept="image/*" onchange="handleImg(event,'uz-result','pi-result')">
            <img id="pi-result" src="" style="display:none"><div class="overlay"><span style="color:#fff;font-size:12px">Changer</span></div>
            <div class="upload-icon" style="color:var(--orange)">&#x1F4CD;</div>
            <div class="upload-label-text">Résultat</div>
            <div class="upload-sublabel">Clôture du trade</div>
          </div>
        </div>
      </div>
